<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGS School - Parent Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f9f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #16a085; border-bottom: 2px solid #1abc9c; padding-bottom: 10px; }
        .dashboard-section { background: #ffffff; border-radius: 8px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border-left: 5px solid #16a085;}
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;}
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap;}
        select, input[type="text"], textarea { padding: 8px; border-radius: 4px; border: 1px solid #ccc; font-size: 14px;}
        button { padding: 10px 20px; font-size: 14px; font-weight: bold; border: none; border-radius: 4px; color: white; cursor: pointer; transition: 0.2s; background-color: #16a085;}
        button:hover { background-color: #12876f; transform: translateY(-1px); }
        button:disabled { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }
        .btn-blue { background-color: #2980b9; } .btn-blue:hover { background-color: #1f618d; }
        
        /* New Mic Button Style */
        .mic-btn { border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; background-color: #e74c3c; flex-shrink: 0;}
        
        .output-box { background: #f8f9fa; border: 1px solid #e1e8ed; padding: 20px; border-radius: 4px; margin-top: 15px; font-size: 15px; line-height: 1.6; }
        .loading-spinner { color: #16a085; font-style: italic; margin: 15px 0; padding: 10px; background: #e8f8f5; border-left: 4px solid #16a085;}
        .error-text { color: #c0392b; font-weight: bold; }
        
        .analytics-container { display: flex; gap: 20px; margin-top: 20px; align-items: flex-start;}
        .chart-container { flex: 2; width: 100%; max-width: 500px;}
        .report-box { flex: 1; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍👩‍👦 Parent AI Dashboard</h1>

    <div class="dashboard-section">
        <h2>📅 Assignment Tracker Report</h2>
        <button onclick="loadAssignments(this)">Generate Assignment Update</button>
        <div id="task-loading" class="loading-spinner" style="display: none;">Checking your child's planner...</div>
        <div id="task-workspace" class="output-box" style="display: none;"></div>
    </div>

    <div class="dashboard-section">
        <h2>📈 Academic Progress Report</h2> 
        <div class="controls">
            <select id="perf-scope" onchange="toggleSubjectInput()">
                <option value="all">All Subjects Overall</option>
                <option value="single">Specific Subject</option>
            </select>
            <input type="text" id="perf-subject" placeholder="e.g., Math" style="display: none;">
            <button onclick="loadAnalytics(this)">Generate Progress Report</button> 
        </div>
        
        <div id="perf-loading" class="loading-spinner" style="display: none;">Analyzing test scores...</div>
        <div id="perf-workspace" class="analytics-container" style="display: none;">
            <div class="chart-container"><canvas id="perfChart"></canvas></div>
            <div id="perf-report" class="output-box report-box"></div>
        </div>
    </div>

    <div class="dashboard-section">
        <h2>🌍 School Communication Tools</h2>
        <p>Speak to type, translate school notices, or use text-to-speech to listen to them.</p>
        
        <textarea id="comm-text" rows="4" style="width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px;" placeholder="Paste an email, report card note, or use the mic to dictate..."></textarea>
        
        <div class="controls">
            <button id="dictate-btn" class="mic-btn" onclick="toggleDictation()" title="Click to Speak">🎙️</button>
            
            <select id="lang-select">
                <option value="English">English</option>
                <option value="Hindi">Hindi</option>
                <option value="Telugu">Telugu</option>
                <option value="Tamil">Tamil</option>
                <option value="Kannada">Kannada</option>
                <option value="Malayalam">Malayalam</option>
                <option value="Marathi">Marathi</option>
                <option value="Bengali">Bengali</option>
                <option value="Oriya">Oriya</option>
                <option value="Sanskrit">Sanskrit</option>
                <option value="Koya">Tribal - Koya</option>
                <option value="Gondi">Tribal - Gondi</option>
                <option value="Konda">Tribal - Konda</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
            </select>
            <button onclick="translateText(this)">Translate Text</button>
            <button id="speak-btn" onclick="speakText(this)" class="btn-blue">🔊 Listen (Read Aloud)</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = "http://localhost:5000/api/v1/ai/parent";

    // Attached ID so the Database queries the correct Parent-Student Mapping
    const activeUser = { id: 1, name: "Parent Ravi", email: "ravi@sgs.edu", role: "Parent" };

    async function fetchWithLog(endpoint, payload) {
        const bodyData = { ...payload, userInfo: activeUser };
        const res = await fetch(`${API_BASE}${endpoint}`, { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(bodyData) 
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Request failed.");
        return data;
    }

    // 1. Assignment Report
    async function loadAssignments(btn) {
        if(btn) btn.disabled = true;
        const loading = document.getElementById('task-loading');
        const ws = document.getElementById('task-workspace');
        
        ws.style.display = 'none'; loading.style.display = 'block';
        try {
            const data = await fetchWithLog('/assignments', {});
            
            let displayHTML = `<strong>AI Assistant Note:</strong><br>${marked.parse(data.report)}`;
            if(data.list && data.list.length > 0) {
                displayHTML += `<hr><h4>Recent Tasks:</h4><ul>`;
                data.list.forEach(item => displayHTML += `<li><strong>${item.subject} (${item.task})</strong>: ${item.status}</li>`);
                displayHTML += `</ul>`;
            }
            ws.innerHTML = displayHTML;
        } catch(err) { 
            ws.innerHTML = `<span class="error-text">🚨 ${err.message}</span>`; 
        } finally { 
            loading.style.display = 'none'; 
            ws.style.display = 'block'; 
            if(btn) btn.disabled = false; 
        }
    }

    function toggleSubjectInput() {
        const scope = document.getElementById('perf-scope').value;
        document.getElementById('perf-subject').style.display = scope === 'single' ? 'inline-block' : 'none';
    }

    // 2 & 3. Performance Analytics
    let chartInstance = null;
    async function loadAnalytics(btn) {
        if(btn) btn.disabled = true;
        const loading = document.getElementById('perf-loading');
        const ws = document.getElementById('perf-workspace');
        const scope = document.getElementById('perf-scope').value;
        const subject = document.getElementById('perf-subject').value;
        
        ws.style.display = 'none'; loading.style.display = 'block';
        
        try {
            const data = await fetchWithLog('/analytics', { scope, subject });
            
            document.getElementById('perf-report').innerHTML = `<strong>Counselor Notes:</strong><br>${marked.parse(data.analysis || "No notes generated.")}`;
            
            if (data.chartData && Array.isArray(data.chartData) && data.chartData.length > 0) {
                const ctx = document.getElementById('perfChart').getContext('2d');
                if (chartInstance) chartInstance.destroy();
                
                const chartLabels = scope === 'all' 
                    ? data.chartData.map(g => g.subject) 
                    : data.chartData.map(g => g.test_name);
                    
                const chartScores = data.chartData.map(g => g.score);

                chartInstance = new Chart(ctx, { 
                    type: scope === 'all' ? 'bar' : 'line', 
                    data: { 
                        labels: chartLabels, 
                        datasets: [{ 
                            label: scope === 'all' ? 'Overall Average %' : `${subject || 'Subject'} Score %`, 
                            data: chartScores, 
                            backgroundColor: '#16a085',
                            borderColor: '#2980b9',
                            fill: scope !== 'all'
                        }] 
                    },
                    options: { scales: { y: { min: 0, max: 100 } } }
                });
            }
            ws.style.display = 'flex';
        } catch(err) { 
            document.getElementById('perf-report').innerHTML = `<span class="error-text">🚨 UI Error: ${err.message}</span>`; 
            ws.style.display = 'flex'; 
        } finally { 
            loading.style.display = 'none'; 
            if(btn) btn.disabled = false; 
        }
    }

    // --- DICTATION & VOICE SETUP ---
    const languageCodes = {
        "English": "en-US", "Telugu": "te-IN", "Hindi": "hi-IN",
        "Oriya": "or-IN", "Bengali": "bn-IN", "Marathi": "mr-IN",
        "Sanskrit": "sa-IN", "Tamil": "ta-IN", "Malayalam": "ml-IN",
        "Kannada": "kn-IN", "French": "fr-FR", "Spanish": "es-ES",
        "Koya": "en-US", "Gondi": "en-US", "Konda": "en-US" 
    };

    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        
        recognition.onresult = (e) => { 
            document.getElementById('comm-text').value += e.results[0][0].transcript + " "; 
            document.getElementById('dictate-btn').innerText = "🎙️"; 
            document.getElementById('dictate-btn').style.backgroundColor = "#e74c3c";
        };

        recognition.onend = () => {
            document.getElementById('dictate-btn').innerText = "🎙️"; 
            document.getElementById('dictate-btn').style.backgroundColor = "#e74c3c";
        };
    }

    function toggleDictation() { 
        if(recognition){ 
            const selectedLang = document.getElementById('lang-select').value;
            recognition.lang = languageCodes[selectedLang] || "en-US";
            
            document.getElementById('dictate-btn').innerText = "🔴"; 
            document.getElementById('dictate-btn').style.backgroundColor = "#2ecc71"; 
            recognition.start(); 
        } else { 
            alert("Speech recognition is not supported in this browser. Please use Chrome."); 
        }
    }

    // 4. Translate Logic
    async function translateText(btn) {
        const text = document.getElementById('comm-text').value;
        const lang = document.getElementById('lang-select').value;
        if(!text) return;
        
        if(btn) { btn.disabled = true; btn.innerText = "Translating..."; }
        try {
            const data = await fetchWithLog('/translate', { text: text, targetLanguage: lang });
            document.getElementById('comm-text').value = data.translation;
        } catch(err) { 
            alert("Translation error: " + err.message); 
        } finally { 
            if(btn) { btn.disabled = false; btn.innerText = "Translate Text"; }
        }
    }

    // 5. NEW: Google Cloud Backend TTS Logic
    async function speakText(btnElement) { 
        window.speechSynthesis.cancel(); // Stop any built-in speech playing
        
        const textToSpeak = document.getElementById('comm-text').value;
        const selectedLang = document.getElementById('lang-select').value;
        
        if (!textToSpeak) return;

        const originalText = btnElement.innerText;
        btnElement.innerText = "⏳ Loading Voice...";
        btnElement.disabled = true;

        try {
            // Reaches out to the parent backend route you just created!
            const res = await fetch(`${API_BASE}/speak`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: textToSpeak,
                    language: selectedLang
                })
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error || "TTS failed");

            // Play the audio generated from the cloud
            const audioStream = new Audio("data:audio/mp3;base64," + data.audioData);
            await audioStream.play();

        } catch (err) {
            console.error("Cloud TTS Playback Error:", err);
            alert(`⚠️ Audio error: ${err.message}`);
        } finally {
            btnElement.innerText = originalText;
            btnElement.disabled = false;
        }
    }
</script>
</body>
</html>
